<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE-edge" />
    <meta name="viewport" content="width=, initial-scale=1.0" />
    <title>Sumit - Developer Portfile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300&family=Poor+Story&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300&display=swap"

   <style>
    * {
    margin: 0;
    padding: 0;
  }

  body {
    background-color:#639cd9;
    font-family: "Merriweather", serif;
  }

  nav {
    display: flex;
    justify-content: space-around;
    align-items: center;
    height: 100px;
    background-color: #5454c5;
    font-size: 150%;
    color: #c9c5e7;
  }


  
  nav ul a{ 
    text-decoration: none;
    color: #c9c5e7 ;
  }

  nav ul a:hover{
    text-decoration: none;
    color: #9286e9;
  }

  nav ul {
    display: flex;
    justify-content: center;
  }

  nav ul li {
    list-style: none;
    margin: 0 23px;
  }


  .left {
    font-size: 1.5rem;
  }

  .left:hover {
    font-size: 1.51rem;
    color: #9286e9;
  }

  .firstsection {
    display: flex;
    justify-content: space-around;
    margin: 23px 0;
  }

  .firstsection div {
    width: 30%;
  }

  .leftsection {
    margin: 123px 51px 0;
    font-size: 200%;
    color: #80ceed;
  }

  .rightsection {
    margin: 24px 0;
  }
   
  img {
    height: 100%;
    width: 100%;
  }

  .Orange{
    color: #7100ea;
  }

  span{
    color: #7100ea;
  }

  .secondsection{
    max-width: 80vw;
    margin: auto;
    color: white;
  }

   </style>
  </head>
  <body>
    <header>
      <nav>
        <div class="left">Sumit's Portfolio</div>
        <div class="right"></div>
        <ul>
          <a>
            <li><a href="/">Home</a></li>
            <li><a href="/">About</a></li>
            <li><a href="/">Services</a></li>
            <li><a href="/">Projects</a></li>
            <li><a href="/">Contact Me</a></li>
          </a>
        </ul>
      </nav>
    </header>

    <main>


      <section class="firstsection">
        <div class="leftsection">
          HEY, MY NAME IS
          <span class="Orange">SUMIT</span>
          <ul>
            AND I'M A PASSIONATE
          </ul>
          <span id="profession"></span>
        </div>

        <div class="rightsection">
          <img src="dev4.png" alt="PHOTO" />
        </div>
      </section>



      <section class="secondsection">
        <hr>
        <h1> Fresher </h1>
      </section>

    </main>

    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <a></a>
    <script>
      var typed = new Typed("#profession", {
        strings: [
          "WEB DEVELOPER",
          "PHOTO EDITOR",
          "GAMER",
          "ANDROID DEVELOPER",
        ],
        typeSpeed: 50,
      });
    </script>
  </body>
</html>
